services:
  # ── Infrastructure ─────────────────────────────────────────────────
  scrapling-mcp:
    image: pyd4vinci/scrapling:latest
    ports:
      - "${SCRAPLING_MCP_PORT:-8017}:8017"
    command: ["mcp", "--http", "--port", "8017"]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PROXY_PORT:-4000}:4000"
    volumes:
      - ./proxy_config.yaml:/app/proxy_config.yaml
    env_file:
      - conference_agent/.env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-litellm}:${POSTGRES_PASSWORD:-litellm}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-litellm}
      - MAX_RETRY_DELAY=120
      - INITIAL_RETRY_DELAY=1
    command: ["--config", "/app/proxy_config.yaml", "--port", "4000"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Application (run manually) ─────────────────────────────────────
  # Backend:  uv run uvicorn web.app:app --reload --port 8001
  # Frontend: cd web/frontend && npm run dev
  #
  # backend:
  #   build: .
  #   env_file: [conference_agent/.env]
  #   environment:
  #     BACKEND_HOST: 0.0.0.0
  #     BACKEND_PORT: 8001
  #     CORS_ORIGINS: http://localhost:5173
  #     LITELLM_PROXY_API_BASE: http://localhost:4000
  #     SCRAPLING_MCP_URL: http://localhost:8017/mcp
  #   ports: ["8001:8001"]
  #   depends_on: [litellm-proxy, scrapling-mcp]
  #
  # frontend:
  #   build: ./web/frontend
  #   environment:
  #     VITE_API_PROXY_TARGET: http://localhost:8001
  #     VITE_HOST: 0.0.0.0
  #     VITE_PORT: 5173
  #   ports: ["5173:5173"]
  #   depends_on: [backend]

volumes:
  postgres_data: