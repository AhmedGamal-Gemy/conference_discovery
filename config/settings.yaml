# ─────────────────────────────────────────
# Conference Discovery — settings.yaml
# ─────────────────────────────────────────

topics:
  medical: "Medical"
  scientific: "Scientific"
  cardiology: "Cardiology"
  oncology: "Oncology"
  radiology: "Radiology"
  business: "Business & Economics"
  computer-science: "Computer Science"
  education: "Education"
  engineering: "Engineering & Technology"
  interdisciplinary: "Interdisciplinary"
  law: "Law"
  mathematics: "Mathematics & Statistics"
  regional: "Regional Studies"
  social-sciences: "Social Sciences & Humanities"
  sports: "Sports Science"

discovery:
  topic: "medical"
  months_ahead: 3
  query_templates: []              # Empty = use defaults from query_generator
  subfields: ["cardiology", "radiology", "oncology", "neurology", "pediatrics"]  # Topic sub-categories for subfield queries
  sources:
    exa: true
    directories: true
    org_websites: false     # disabled for demo

exa:
  num_results: 10            # Increased from 5 — more URLs before dedup
  pages_per_query: 2         # Reserved for future pagination
  type: "neural"             # Neural (semantic) search — handles query optimization internally
  text_max_chars: 1000       # Richer snippets for relevance filter
  include_domains: []        # Restrict search to these domains (empty = no restriction)
  exclude_domains: []        # Exclude these domains from search results

validation:
  min_speakers: 5
  min_non_local: null              # null = skip this check until geocoding step is wired
  min_travel_hours: null           # null = skip this check until geocoding step is wired
  min_non_usa: 2                 # min non-USA speakers required to pass
  date_window:
    min_days: 30            # reject if < 1 month away
    max_days: 90            # queue if > 3 months away

output:
  excel_path: "./output/conferences.xlsx"
  notify_email: ""          # empty = skip email for demo

llm:
  orchestrator:
    model: "mistral-small"
    temperature: 0.2
  discovery:
    model: "mistral-small"
    temperature: 0.2
  extraction:
    model: "mistral-large"
    temperature: 0.1
  validation:
    model: "mistral-small"
    temperature: 0.1
  relevance_filter:
    model: "mistral-small"
    temperature: 0.0

scrapling_mcp_url: "http://localhost:8017/mcp"

debug : false

# ─── Directory aggregator sources ────────────────────────────
directories:
  enabled: true
  max_entries_per_source: 10
  aggregators:
    - name: "worldconferencecalendar"
      url_map:
        medical: "https://worldconferencecalendar.com/events?categories=health-and-medicine"
        cardiology: "https://worldconferencecalendar.com/events?categories=health-and-medicine"
        oncology: "https://worldconferencecalendar.com/events?categories=health-and-medicine"
        radiology: "https://worldconferencecalendar.com/events?categories=health-and-medicine"
        scientific: "https://worldconferencecalendar.com/events?categories=physical-and-life-sciences"
        business: "https://worldconferencecalendar.com/events?categories=business-and-economics"
        computer-science: "https://worldconferencecalendar.com/events?categories=computer-science-and-internet"
        education: "https://worldconferencecalendar.com/events?categories=education"
        engineering: "https://worldconferencecalendar.com/events?categories=engineering-and-technology"
        interdisciplinary: "https://worldconferencecalendar.com/events?categories=interdisciplinary"
        law: "https://worldconferencecalendar.com/events?categories=law"
        mathematics: "https://worldconferencecalendar.com/events?categories=mathematics-and-statistics"
        regional: "https://worldconferencecalendar.com/events?categories=regional-studies"
        social-sciences: "https://worldconferencecalendar.com/events?categories=social-sciences-and-humanities"
        sports: "https://worldconferencecalendar.com/events?categories=sports-science"
      listing_selector: ""
      title_selector: ""
      detail_link_selector: ""
      detail_url_pattern: ""
      visit_link_selector: ""
      extract_by_markdown: true
