litellm_settings:
  drop_params: true
  set_verbose: false

model_list:
  # Fast model — simple tasks (orchestration, validation, discovery, filtering)
  - model_name: freetheai-fast
    litellm_params:
      model: openai/opc/deepseek-v4-flash-free
      api_base: https://api.freetheai.xyz/v1
      api_key: os.environ/FREETHEAI_API_KEY
    rpm: 10
    tpm: 100000
    timeout: 90
    num_retries: 3

  # Smart model — complex extraction (structured data, link classification)
  - model_name: freetheai-smart
    litellm_params:
      model: openai/bbl/gpt-5.5-mini
      api_base: https://api.freetheai.xyz/v1
      api_key: os.environ/FREETHEAI_API_KEY
    rpm: 10
    tpm: 100000
    timeout: 120
    num_retries: 3

general_settings:
  master_key: sk-1234
  database_url: postgresql://litellm:litellm@db:5432/litellm

router_settings:
  redis_host: ""
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 90
  retry_after: 2
  allowed_fails: 5
  cooldown_time: 20
